name: barglabs.ai site sync proposal

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "17 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Propose-only site sync audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Checkout shared Aelfric engine
        uses: actions/checkout@v5
        with:
          repository: houman44/alfred
          path: aelfric-engine
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run focused Aelfric tests
        env:
          AELFRIC_ENGINE_PATH: ${{ github.workspace }}/aelfric-engine
          PYTHONPATH: ${{ github.workspace }}/aelfric-engine
        run: python -m unittest discover -s tests -t . -v

      - name: Best-effort product STATUS checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          mkdir -p ../product-status
          for repo in houman44/alfred houman44/egbert houman44/edwin houman44/therasyn houman44/site-machine houman44/knut houman44/henry houman44/edwy houman44/simba houman44/wilfrid; do
            slug="${repo##*/}"
            gh repo clone "$repo" "../product-status/${slug}" -- --depth=1 >/tmp/site-sync-${slug}.log 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "::notice::Could not read ${repo}; audit will flag missing evidence if the product appears."
            fi
          done
          exit 0

      - name: Run propose-only audit
        id: audit
        env:
          AELFRIC_ENGINE_PATH: ${{ github.workspace }}/aelfric-engine
          PYTHONPATH: ${{ github.workspace }}/aelfric-engine
          PRODUCT_STATUS_ROOTS: ${{ github.workspace }}/../product-status
        run: |
          python scripts/site_sync_audit.py \
            --root . \
            --output site-sync-proposal.md \
            --json-output site-sync-findings.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Refresh proposal issue
        if: steps.audit.outputs.drift_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="barglabs.ai sync proposal $(date -u +%F)"
          existing="$(gh issue list \
            --state open \
            --search 'barglabs.ai sync proposal in:title' \
            --json number \
            --jq '.[0].number // ""')"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file site-sync-proposal.md
          else
            gh issue create --title "$title" --body-file site-sync-proposal.md
          fi
